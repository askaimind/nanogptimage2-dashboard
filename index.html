<!DOCTYPE html>
<html lang="en">
<head>
  <script>
  // ---- Auto cache-bust: forces a fresh fetch after every deploy without manual ?v= ----
  // Bump BUILD whenever index.html changes. On load, if the URL's ?v= doesn't match,
  // reload ONCE with ?v=BUILD so the browser pulls the new file. The sessionStorage
  // guard stops this from looping. Result: visitors always land on current code.
  (function(){
    var BUILD = '23';
    try {
      var url = new URL(window.location.href);
      var v = url.searchParams.get('v');
      if (v !== BUILD) {
        if (sessionStorage.getItem('nano_reloaded_for') === BUILD) return; // already fresh this session
        sessionStorage.setItem('nano_reloaded_for', BUILD);
        url.searchParams.set('v', BUILD);
        window.location.replace(url.toString());
      }
    } catch(e) { /* if URL API unavailable, fail open - page still works */ }
  })();
  </script>
<meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NanoRunway · Discovery</title>
<style>
/* ---------- YouTube-mobile faithful reproduction ----------
   Goal: judge stories in the exact visual context they'll compete in.
   Layout, type scale, and spacing mirror the YouTube Android feed. */
:root{
  --bg:#0f0f0f;            /* YT dark bg */
  --surface:#0f0f0f;
  --chip:#272727;
  --chip-active:#f1f1f1;
  --chip-active-text:#0f0f0f;
  --text:#f1f1f1;
  --text-dim:#aaaaaa;
  --line:#272727;
  --red:#ff0000;
  --green:#7EE8A2;
  --amber:#FFD166;
  --skip:#888;
  --pill:#000c;
  --yt-sans:'Roboto','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:var(--yt-sans);}
body{max-width:480px;margin:0 auto;padding-bottom:64px;overflow-x:hidden;}

/* ---- Top app bar ---- */
.appbar{position:sticky;top:0;z-index:30;background:var(--bg);
  display:flex;align-items:center;gap:10px;padding:12px 14px 8px;
  flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;-ms-overflow-style:none;}
.appbar::-webkit-scrollbar{display:none;}
.appbar>*{flex:0 0 auto;}
.yt-logo{display:flex;align-items:center;gap:6px;font-weight:700;font-size:20px;letter-spacing:-.5px;}
.yt-mark{width:30px;height:21px;background:var(--red);border-radius:5px;position:relative;flex:none;}
.yt-mark::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-45%,-50%);
  border-left:9px solid #fff;border-top:6px solid transparent;border-bottom:6px solid transparent;}
.src-toggles{display:flex;gap:12px;font-size:13px;color:var(--text-dim);margin-left:10px;flex-wrap:nowrap;}
.refresh-btn{margin-left:auto;background:var(--chip);border:none;color:var(--text);
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex:none;}
.refresh-btn:active{background:#3a3a3a;}
.refresh-btn svg{width:18px;height:18px;}
.refresh-btn.spinning svg{animation:spin .8s linear infinite;}
.genthumb-btn{background:var(--chip);border:1px solid rgba(126,232,162,.4);color:var(--green);
  height:34px;padding:0 12px;border-radius:17px;font-size:12px;font-weight:700;
  display:flex;align-items:center;cursor:pointer;flex:none;margin-left:8px;white-space:nowrap;}
.genthumb-btn:active{transform:scale(.97);}
.genthumb-btn:disabled{opacity:.6;cursor:default;}
.genthumb-btn.rendering{border-color:var(--green);color:var(--green);
  animation:genpulse 1.1s ease-in-out infinite;}
@keyframes genpulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(126,232,162,.0);}
  50%{opacity:.65;box-shadow:0 0 10px 1px rgba(126,232,162,.45);}}
.src-toggles label{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;white-space:nowrap;}
.src-toggles input{accent-color:var(--red);width:14px;height:14px;}

/* ---- Category chips ---- */
.chips{display:flex;gap:8px;overflow-x:auto;padding:6px 14px 12px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:none;background:var(--chip);color:var(--text);border:none;
  padding:8px 14px;border-radius:9px;font-size:14px;font-weight:500;white-space:nowrap;cursor:pointer;}
.chip.active{background:var(--chip-active);color:var(--chip-active-text);font-weight:600;}

/* ---- Feed ---- */
.feed{display:flex;flex-direction:column;}
.card{cursor:pointer;}
.thumb-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#1c1c1c;overflow:hidden;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  color:#555;font-size:13px;text-align:center;padding:0 20px;line-height:1.4;}
.dur{position:absolute;right:8px;bottom:8px;background:var(--pill);color:#fff;
  font-size:12px;font-weight:600;padding:2px 5px;border-radius:5px;}
.meta{display:flex;gap:12px;padding:12px 12px 18px;}
.avatar{width:36px;height:36px;border-radius:50%;flex:none;background:#333;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.meta-text{flex:1;min-width:0;}
.vid-title{font-size:15px;font-weight:600;line-height:1.3;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
/* When the card is expanded, reveal the FULL title (no clamp) so a cut-off
   headline/title never ends abruptly — tapping the card shows the rest. */
.card.open .vid-title{-webkit-line-clamp:unset;display:block;overflow:visible;}
.vid-sub{font-size:13px;color:var(--text-dim);margin-top:4px;line-height:1.35;}
.kebab{flex:none;color:var(--text-dim);font-size:20px;line-height:1;padding:2px 2px 0;}

/* status accent dot on card */
.statusline{height:2px;width:0;background:var(--green);transition:width .3s;}
.card[data-eff="selected"] .statusline{width:100%;background:var(--green);}
.card[data-eff="hold"]     .statusline{width:100%;background:var(--amber);}
.card[data-eff="skip"]     .statusline{width:100%;background:#444;}

/* ---- Expanded detail (tap to open) ---- */
.detail{display:none;background:#1a1a1a;border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);padding:16px 14px 20px;}
.card.open .detail{display:block;animation:slide .22s ease;}
@keyframes slide{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
.d-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center;}
.reroll-btn{margin-left:auto;font-size:12px;font-weight:700;padding:5px 11px;border-radius:7px;
  border:1px solid rgba(139,180,255,.4);background:rgba(139,180,255,.10);color:#8bb4ff;cursor:pointer;
  white-space:nowrap;}
.reroll-btn:active{transform:scale(.96);}
.reroll-btn:disabled{opacity:.6;cursor:default;}
.reroll-btn.spinning{animation:rerollspin 1s linear infinite;}
@keyframes rerollspin{from{filter:brightness(1)}50%{filter:brightness(1.5)}to{filter:brightness(1)}}
.badge{font-size:12px;font-weight:600;padding:4px 9px;border-radius:7px;background:#272727;color:var(--text-dim);}
.badge.score{color:var(--green);background:rgba(126,232,162,.12);}
.badge.gate-pass{color:var(--green);background:rgba(126,232,162,.12);}
.badge.gate-fail{color:#E57373;background:rgba(229,115,115,.12);}
.d-block{margin-bottom:13px;}
.d-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;}
.d-val{font-size:14px;line-height:1.5;color:var(--text);}
.d-val.pitch{font-style:italic;color:#ddd;}
.actions{display:flex;gap:8px;margin-top:18px;}
.abtn{flex:1;padding:12px;border-radius:10px;border:1px solid;font-size:14px;font-weight:700;
  cursor:pointer;background:transparent;transition:transform .1s;}
.abtn:active{transform:scale(.97);}
.abtn-deploy{color:var(--green);border-color:rgba(126,232,162,.4);background:rgba(126,232,162,.10);}
.abtn-hold{color:var(--amber);border-color:rgba(255,209,102,.4);background:rgba(255,209,102,.10);}
.abtn-skip{color:#bbb;border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.04);}

/* ---- Bottom nav ---- */
.botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:#0f0f0f;border-top:1px solid var(--line);display:flex;z-index:40;}
.tab{flex:1;padding:9px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--text-dim);font-size:11px;font-weight:500;cursor:pointer;background:none;border:none;}
.tab.active{color:var(--text);}
.tab svg{width:22px;height:22px;}
.tab .count{position:absolute;}

/* ---- misc ---- */
.empty{padding:60px 30px;text-align:center;color:var(--text-dim);font-size:14px;line-height:1.6;}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:#fff;color:#0f0f0f;
  padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:60;opacity:0;
  transition:opacity .2s;pointer-events:none;}
.toast.show{opacity:1;}
.loading{padding:50px;text-align:center;color:var(--text-dim);}
.spinner{width:28px;height:28px;border:3px solid #333;border-top-color:var(--red);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.bf-overlay{position:fixed;inset:0;background:rgba(0,0,0,.66);display:none;align-items:flex-end;justify-content:center;z-index:50;}
.bf-overlay.open{display:flex;}
.bf-sheet{background:var(--card,#1c1c1f);width:100%;max-width:520px;border-radius:18px 18px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));max-height:82vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.5);}
.bf-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.bf-title{font-size:18px;font-weight:800;}
.bf-x{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px 8px;}
.bf-sub{font-size:12.5px;color:var(--text-dim);line-height:1.45;margin-bottom:14px;}
.bf-list{display:flex;flex-direction:column;gap:8px;}
.bf-row{display:flex;align-items:center;gap:10px;padding:9px 10px;background:var(--chip,#26262b);border-radius:10px;}
.bf-row .bf-name{flex:1;font-size:14px;font-weight:600;}
.bf-step{display:flex;align-items:center;gap:10px;}
.bf-step button{width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.14);background:var(--card,#1c1c1f);color:var(--text,#fff);font-size:18px;font-weight:700;cursor:pointer;line-height:1;}
.bf-step button:active{transform:scale(.94);}
.bf-step .bf-count{min-width:20px;text-align:center;font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;}
.bf-foot{display:flex;align-items:center;justify-content:space-between;margin-top:16px;gap:12px;}
.bf-total{font-size:13px;color:var(--text-dim);}
.bf-go{flex:0 0 auto;background:var(--green,#7ee8a2);color:#06120a;border:none;border-radius:10px;padding:11px 22px;font-size:15px;font-weight:800;cursor:pointer;}
.bf-go:disabled{opacity:.5;cursor:default;}
.bf-go.working{opacity:.85;}
#backfill-btn.spinning{
  animation:bfspin 0.9s linear infinite;
  background:var(--green,#7ee8a2)!important;
  color:#06120a!important;
  border-color:var(--green,#7ee8a2)!important;
  box-shadow:0 0 10px 1px rgba(126,232,162,.7);
}
@keyframes bfspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="appbar">
  <div class="yt-logo"><span class="yt-mark"></span>Discovery<span style="font-size:10px;color:var(--text-dim);font-weight:400;margin-left:4px;">v23</span></div>
  <button class="refresh-btn" id="refresh-btn" title="Refresh feed" onclick="load()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
  </button>
  <button class="genthumb-btn" id="genthumb-btn" title="Generate thumbnails for rows marked ADD" onclick="generateThumbnails()">Gen Thumbs</button>
  <button class="genthumb-btn" id="backfill-btn" title="Request stories per channel — pulls existing, generates the rest" onclick="openBackfill()" style="margin-left:6px;">Backfill</button>
  <div class="src-toggles">
    <label><input type="checkbox" class="src" value="reddit" checked>Reddit</label>
    <label><input type="checkbox" class="src" value="youtube" checked>YouTube</label>
    <label><input type="checkbox" class="src" value="news" checked>News</label>
  </div>
</div>

<div class="chips" id="chips"></div>

<div class="feed" id="feed">
  <div class="loading"><div class="spinner"></div>Loading stories…</div>
</div>

<nav class="botnav" id="botnav">
  <button class="tab active" data-view="discovery">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    Discovery</button>
  <button class="tab" data-view="deployed">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3 22 20H2z"/></svg>
    Deployed</button>
  <button class="tab" data-view="hold">
    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
    On Hold</button>
  <button class="tab" data-view="skip">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 6 18 18M18 6 6 18"/></svg>
    Skipped</button>
</nav>

<div class="toast" id="toast"></div>

<!-- Backfill modal: pick channels + counts, request in one go -->
<div class="bf-overlay" id="bf-overlay" onclick="if(event.target===this)closeBackfill()">
  <div class="bf-sheet">
    <div class="bf-head">
      <div class="bf-title">Backfill channels</div>
      <button class="bf-x" onclick="closeBackfill()">✕</button>
    </div>
    <div class="bf-sub">Set how many stories you want per channel. Existing unused cards are pulled first; the rest are generated fresh. All land at the top of Discovery.</div>
    <div class="bf-list" id="bf-list"></div>
    <div class="bf-foot">
      <div class="bf-total" id="bf-total">0 requested</div>
      <button class="bf-go" id="bf-go" onclick="submitBackfill()">Request</button>
    </div>
  </div>
</div>

<script>
const READ_URL = 'https://askai.app.n8n.cloud/webhook/nano-dashboard-read';
const ACT_URL  = 'https://askai.app.n8n.cloud/webhook/nano-dashboard-action';
const GEN_URL  = 'https://askai.app.n8n.cloud/webhook/nano-gen-thumb';
const REROLL_URL = 'https://askai.app.n8n.cloud/webhook/nano-reroll';
const BACKFILL_URL = 'https://askai.app.n8n.cloud/webhook/nano-backfill';

// 10 canonical categories (chip labels are short; match against full Channel Category)
const CATS = ['All','Night Feed','True Crime','History','Science','Psychology','Horror','Survival','Technology','Philosophy','Travel'];
// map short chip -> substring to match the full canonical category coming from the sheet
const CAT_MATCH = {
  'Night Feed':'Mystery & The Unknown', 'True Crime':'True Crime', 'History':'History',
  'Science':'Science', 'Psychology':'Psychology', 'Horror':'Horror & Dark',
  'Survival':'Survival', 'Technology':'Technology', 'Philosophy':'Philosophy', 'Travel':'Travel'
};

let allStories=[];
let activeCat='All';
let activeView='discovery';
// One-time migration: older cached builds could persist a stale 'select' under a
// card's URL. Purge any localActs on load for build v23 so no ghost survives the
// cache swap; the sheet is the source of truth and will repaint correct state.
let localActs = JSON.parse(localStorage.getItem('nano_acts')||'{}');
if(localStorage.getItem('nano_build')!=='v23'){ localActs={}; try{localStorage.setItem('nano_acts','{}');localStorage.setItem('nano_build','v23');}catch(_){} }
function saveActs(){ try{localStorage.setItem('nano_acts',JSON.stringify(localActs));}catch(_){} }

const SHEET_ACTIONS = new Set(['selected','hold','skip']);
// The workflow sets Status='scored' on EXACTLY the rows you re-request via Gen Thumbs
// or Reroll — the deliberate "return to Discovery" signal.
const SHEET_RETURNS_TO_DISCOVERY = new Set(['scored','ready_for_idea_generation']);
// THE SHEET IS THE SOURCE OF TRUTH. Your Deploy/Hold/Skip taps are written to the
// sheet's Status column (Update Status node, matched by Source URL), so on the next
// load the sheet already reflects them across every device. localStorage is kept only
// as a brief optimistic bridge: it makes a card move the instant you tap, before the
// sheet round-trip completes — but the sheet always wins once it has a definitive value.
const effStatus = s => {
  // 1) Sheet has a definitive triage action → it wins. This is authoritative and
  //    cross-device. Clear any local bridge entry; the sheet now carries the truth.
  if(SHEET_ACTIONS.has(s.status)){
    if(localActs[s.source_url]) { delete localActs[s.source_url]; saveActs(); }
    return s.status;
  }
  // 2) Fresh re-request (scored/return) → Discovery. Clear any stale local action.
  if(SHEET_RETURNS_TO_DISCOVERY.has(s.status)){
    if(localActs[s.source_url]){ delete localActs[s.source_url]; saveActs(); }
    return 'scored';
  }
  // 3) No definitive sheet value yet → fall back to the optimistic local bridge
  //    (covers the brief window between tapping and the sheet write landing).
  const a = localActs[s.source_url];
  return a ? (a==='select'?'selected':a) : (s.status||'scored');
};

// ---- data fetch (unchanged contract) ----
async function load(){
  const rb=document.getElementById('refresh-btn');
  if(rb) rb.classList.add('spinning');
  try{
    const res = await fetch(READ_URL);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    allStories = data.stories || [];
  }catch(e){
    document.getElementById('feed').innerHTML =
      '<div class="empty">Couldn\'t reach the pipeline.<br>'+e.message+'</div>';
    if(rb) rb.classList.remove('spinning');
    return;
  }
  if(rb) rb.classList.remove('spinning');
  renderChips();
  render();
}

function renderChips(){
  const c=document.getElementById('chips');
  c.innerHTML='';
  CATS.forEach(cat=>{
    const b=document.createElement('button');
    b.className='chip'+(cat===activeCat?' active':'');
    b.textContent=cat;
    b.onclick=()=>{activeCat=cat;renderChips();render();};
    c.appendChild(b);
  });
}

function viewMatch(s){
  const eff=effStatus(s);
  if(activeView==='discovery') return !SHEET_ACTIONS.has(eff) || eff==='scored';
  if(activeView==='deployed')  return eff==='selected';
  if(activeView==='hold')      return eff==='hold';
  if(activeView==='skip')      return eff==='skip';
  return true;
}
function catMatch(s){
  if(activeCat==='All') return true;
  const want=CAT_MATCH[activeCat]||activeCat;
  return (s.channel_category||'').includes(want);
}
function srcMatch(s){
  const on=[...document.querySelectorAll('.src:checked')].map(x=>x.value);
  return on.includes((s.source||'').toLowerCase()) || on.length===3;
}

function fmtViews(n){
  n=+n||0;
  if(n>=1e6) return (n/1e6).toFixed(1).replace('.0','')+'M';
  if(n>=1e3) return (n/1e3).toFixed(0)+'K';
  return n;
}
function relDate(d){
  if(!d) return '';
  const t=new Date(d).getTime(); if(isNaN(t)) return '';
  const days=Math.floor((Date.now()-t)/864e5);
  if(days<=0) return 'today';
  if(days===1) return '1 day ago';
  if(days<30) return days+' days ago';
  const mo=Math.floor(days/30); if(mo<12) return mo+(mo===1?' month ago':' months ago');
  const yr=Math.floor(days/365); return yr+(yr===1?' year ago':' years ago');
}
const initials = name => (name||'?').replace(/[^A-Za-z ]/g,'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()||'?';

function render(){
  const feed=document.getElementById('feed');
  let list=allStories.filter(s=>catMatch(s)&&viewMatch(s)&&srcMatch(s));
  // Discovery: only show cards that already carry a real baked thumbnail.
  // (Blank rows stay in the sheet — they're just hidden here until rendered.)
  if(activeView==='discovery') list=list.filter(s=>(s.thumbnail_url||'').trim());
  // Newest first. Prefer Date Added; fall back to sheet row order (later row = newer).
  const ts=s=>{const t=new Date(s.date_added||0).getTime();return isNaN(t)?0:t;};
  // In Discovery, a FRESH re-request (sheet Status=scored) floats to the very top —
  // so when you flag an OLD entry ADD and run Gen Thumbs, it lands where you'll see it
  // immediately instead of sinking to the bottom by its original (old) date.
  const fresh=s=> activeView==='discovery' && SHEET_RETURNS_TO_DISCOVERY.has(s.status) ? 1 : 0;
  list.sort((a,b)=> (fresh(b)-fresh(a)) || (ts(b)-ts(a)) || ((+b.row_number||0)-(+a.row_number||0)) );
  // bottom-nav active state
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===activeView));
  if(!list.length){
    feed.innerHTML='<div class="empty">No stories here yet.<br>'+
      (activeView==='discovery'?'Run the collector to populate Discovery.':'Nothing in this bucket.')+'</div>';
    return;
  }
  feed.innerHTML='';
  list.forEach(s=>feed.appendChild(card(s)));
}

function card(s){
  const eff=effStatus(s);
  const el=document.createElement('div');
  el.className='card'; el.dataset.eff=eff; el.dataset.url=s.source_url||'';

  const headline=(s.thumbnail_headline||s.thumbnail_text||'').trim();
  const thumbUrl=(s.thumbnail_url||'').trim();
  const dur = s.source==='youtube' && s.duration ? s.duration : '';

  // ---- thumbnail (the baked-in image is the art; headline shown only as fallback text) ----
  const thumbInner = thumbUrl
    ? `<img src="${thumbUrl}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=&quot;thumb-fallback&quot;>${(headline||'No thumbnail yet').replace(/"/g,'')}</div>'">`
    : `<div class="thumb-fallback">${headline||'Thumbnail pending'}</div>`;

  // YouTube-style metadata: channel name = the channel this story is FOR; views/age from the source signal
  const chName = s.channel_category ? shortCat(s.channel_category) : (s.source_name||'NanoRunway');
  const viewBits=[];
  if(s.source==='youtube' && s.viral_count) viewBits.push(fmtViews(s.viral_count)+' views');
  if(s.source_name && s.source==='youtube') viewBits.unshift(s.source_name);
  const ageStr=relDate(s.date_added);
  const subline=[chName, viewBits.join(' · '), ageStr].filter(Boolean).join(' · ');

  el.innerHTML=`
    <div class="thumb-wrap">${thumbInner}${dur?`<span class="dur">${dur}</span>`:''}</div>
    <div class="statusline"></div>
    <div class="meta">
      <div class="avatar">${initials(chName)}</div>
      <div class="meta-text">
        <div class="vid-title">${esc(s.title||'Untitled')}</div>
        <div class="vid-sub">${esc(subline)}</div>
      </div>
      <div class="kebab">⋮</div>
    </div>
    ${detailHTML(s)}`;

  // tap card toggles detail (ignore taps on action buttons)
  el.querySelector('.meta').onclick=()=>el.classList.toggle('open');
  el.querySelector('.thumb-wrap').onclick=()=>el.classList.toggle('open');
  el.querySelectorAll('.abtn').forEach(b=>{
    b.onclick=(ev)=>{ev.stopPropagation();sendAction(b.dataset.act,s,el);};
  });
  const rb=el.querySelector('.reroll-btn');
  if(rb){
    rb.onclick=(ev)=>{ev.stopPropagation();rerollStory(s,el);};
    // If a reroll for this row is still in flight, keep the button spinning across
    // the load()/re-render cycles so the animation stays continuous until it lands.
    if(rerollPollers[s.source_url]){ rb.disabled=true; rb.classList.add('spinning'); rb.textContent='⟳ Rerolling…'; }
  }
  return el;
}

function detailHTML(s){
  const score=parseFloat(s.score)||parseFloat(s.viral_score)||0;
  const gate=(s.gate_pass||'').toString().toUpperCase()==='TRUE'||s.gate_pass===true;
  const job=s.thumbnail_job?`<span class="badge">${esc(s.thumbnail_job)}</span>`:'';
  return `<div class="detail">
    <div class="d-row">
      ${score?`<span class="badge score">★ ${score.toFixed(1)}</span>`:''}
      <span class="badge ${gate?'gate-pass':'gate-fail'}">${gate?'GATE PASS':'GATE FAIL'}</span>
      <span class="badge">${esc(s.source||'')}</span>
      ${job}
      <button class="reroll-btn" data-act="reroll" title="Re-read: fix category, regenerate thumbnail & headline">⟳ Reroll</button>
    </div>
    ${block('Headline',(s.thumbnail_headline||s.thumbnail_text))}
    ${block('Elevator Pitch',s.elevator_pitch,'pitch')}
    ${block('Caption',s.caption)}
    ${block('Thumbnail Concept',s.thumbnail_concept)}
    ${block('What Really Happened',trimText((s.story_summary&&s.story_summary.trim())?s.story_summary:s.story_text))}
    ${block('Audience Hook',s.audience_hook)}
    <div class="actions">
      <button class="abtn abtn-deploy" data-act="select">Deploy</button>
      <button class="abtn abtn-hold"   data-act="hold">Hold</button>
      <button class="abtn abtn-skip"   data-act="skip">Skip</button>
    </div>
  </div>`;
}
function block(label,val,cls=''){
  if(!val||!String(val).trim()) return '';
  return `<div class="d-block"><div class="d-label">${label}</div><div class="d-val ${cls}">${esc(val)}</div></div>`;
}
// Fallback for "What Really Happened" when the scorer left Story Summary blank.
// Goal: a quick 3-4 sentence scan, not a wall of text. Takes the first few complete
// sentences of the raw Story Text, with a hard char backstop so a run-on can't sprawl.
function trimText(t){
  t=String(t||'').replace(/\s+/g,' ').trim(); if(!t) return '';
  const MAX_SENTENCES=4, HARD_CAP=360;
  // split into sentences, keeping their end punctuation
  const sentences=t.match(/[^.!?]+[.!?]+/g) || [t];
  let out='';
  for(let i=0;i<sentences.length && i<MAX_SENTENCES;i++){
    const next=(out+sentences[i]).trim();
    if(next.length>HARD_CAP){ if(!out) out=sentences[i].slice(0,HARD_CAP).trim()+'…'; break; }
    out=next;
  }
  return out.trim();
}

// ---- action POST (unchanged contract: action, source_url, story) ----
async function sendAction(action,story,el){
  const url=story.source_url;
  localActs[url]=action; saveActs();
  el.dataset.eff = action==='select'?'selected':action;
  toast(action==='select'?'Deployed →':action==='hold'?'On hold':'Skipped');
  el.classList.remove('open');
  try{
    await fetch(ACT_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action,source_url:url,story})});
  }catch(_){}
  // if we're in a filtered view, re-render so the card moves to its bucket
  setTimeout(render,260);
}

// ---- reroll: AI re-reads the story, fixes category, regenerates thumbnail+headline.
// If the category changes, it also rewrites pitch/caption/summary. The workflow sets
// Status=scored, so the row returns to the TOP of Discovery (float-to-top sort) no
// matter which tab it was sitting in. The spinner keeps going until THIS row's new
// thumbnail actually lands (detected by the thumbnail URL changing), so the animation
// is honest: it stops only when the work is genuinely done (or a hard timeout). ----
async function rerollStory(story,el){
  const url=story.source_url;
  if(!url){ toast('Reroll: missing source URL'); return; }
  const btn=el.querySelector('.reroll-btn');
  // Remember the thumbnail AND task id this row had BEFORE the reroll, so we can detect
  // the genuinely-new render. Reroll writes a NEW Thumbnail Task ID immediately and
  // blanks the URL; Kie's callback later fills the new URL. "Landed" = a fresh non-empty
  // URL has arrived that differs from the old one (task id tracked as corroboration).
  const prevThumb=(story.thumbnail_url||'').trim();
  const prevTaskId=(story.thumbnail_task_id||'').trim();
  const startSpin=()=>{ if(btn){ btn.disabled=true; btn.classList.add('spinning'); btn.textContent='⟳ Rerolling…'; } };
  const stopSpin=(label)=>{ if(btn){ btn.classList.remove('spinning'); btn.disabled=false; btn.textContent=label||'⟳ Reroll'; } };
  startSpin();
  toast('Rerolling — AI re-reading story…');
  try{
    const res=await fetch(REROLL_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'reroll',source_url:url,story})});
    const data=await res.json().catch(()=>({}));
    const cat=data&&data.category?data.category:null;
    const changed=data&&data.changed;
    toast(cat?(changed?`Recategorized → ${shortCat(cat)} — rendering…`:`Category held: ${shortCat(cat)} — rendering…`):'Reroll submitted — rendering…');
    // Jump to Discovery so the user is looking at where the rerolled card will appear.
    activeView='discovery';
    // Clear any local action on this row so nothing keeps it out of Discovery; the
    // workflow's Status=scored is authoritative once the next load reads it.
    if(localActs[url]){ delete localActs[url]; saveActs(); }

    // Poll until THIS row's thumbnail actually changes (the real "done" signal).
    // Keep spinning the whole time so you know it's still working. Hard cap at 5 min.
    const startedAt=Date.now();
    const MAX_MS=5*60*1000;
    if(rerollPollers[url]) clearInterval(rerollPollers[url]);
    rerollPollers[url]=setInterval(async ()=>{
      await load();  // refreshes allStories + repaints; rerolled row floats to top
      const fresh=allStories.find(s=>s.source_url===url);
      const newThumb  = fresh ? (fresh.thumbnail_url||'').trim() : '';
      const newTaskId = fresh ? (fresh.thumbnail_task_id||'').trim() : '';
      // Honest "done": a fresh, non-empty thumbnail URL has landed that differs from the
      // old one (proves Kie's callback finished). A new task id with a still-blank URL
      // means it's mid-render -> keep spinning. Same URL as before -> stale, keep spinning.
      const taskAdvanced = newTaskId && newTaskId!==prevTaskId;
      const landed = newThumb && newThumb!==prevThumb;       // url change is the hard signal
      const timedOut = Date.now()-startedAt>MAX_MS;
      if(landed || timedOut){
        clearInterval(rerollPollers[url]); delete rerollPollers[url];
        if(landed){ toast('Reroll ready ✓ — top of Discovery'); }
        else      { toast('Reroll still rendering — tap ↻ to check'); }
        // The button lives on the card element, which may have been re-rendered by load().
        // Re-find it; if the card moved/re-rendered, the fresh card shows the new image already.
        const liveBtn=document.querySelector(`.card[data-url="${cssEsc(url)}"] .reroll-btn`);
        if(liveBtn){ liveBtn.classList.remove('spinning'); liveBtn.disabled=false; liveBtn.textContent='⟳ Reroll'; }
        else stopSpin();
      }
    },15000);
  }catch(err){
    console.error('reroll failed:',err);
    toast('Reroll failed — retry');
    stopSpin();
  }
}
// Track active reroll pollers per row so re-renders don't spawn duplicates.
const rerollPollers={};
function cssEsc(s){ return String(s).replace(/["\\]/g,'\\$&'); }

// ---- Backfill: request N stories per channel. Pulls existing unused cards first,
// generates the remainder from the Channel Seeds tab. All land at top of Discovery. ----
// Reuse the dashboard's canonical category list (minus 'All') and the short->full map.
const BF_CHANNELS = CATS.filter(c=>c!=='All');
const bfCounts = {};   // {shortLabel: n}
function openBackfill(){
  BF_CHANNELS.forEach(c=>{ if(bfCounts[c]==null) bfCounts[c]=0; });
  const list=document.getElementById('bf-list');
  list.innerHTML='';
  BF_CHANNELS.forEach(c=>{
    const row=document.createElement('div'); row.className='bf-row';
    row.innerHTML=`<div class="bf-name">${c}</div>
      <div class="bf-step">
        <button aria-label="less" onclick="bfBump('${c.replace(/'/g,"\\'")}',-1)">–</button>
        <span class="bf-count" id="bf-c-${cssId(c)}">${bfCounts[c]}</span>
        <button aria-label="more" onclick="bfBump('${c.replace(/'/g,"\\'")}',1)">+</button>
      </div>`;
    list.appendChild(row);
  });
  bfUpdateTotal();
  document.getElementById('bf-overlay').classList.add('open');
}
function closeBackfill(){ document.getElementById('bf-overlay').classList.remove('open'); }
function cssId(c){ return c.replace(/[^A-Za-z0-9]/g,'-'); }
function bfBump(c,d){
  bfCounts[c]=Math.max(0,Math.min(20,(bfCounts[c]||0)+d));
  const el=document.getElementById('bf-c-'+cssId(c)); if(el) el.textContent=bfCounts[c];
  bfUpdateTotal();
}
function bfUpdateTotal(){
  const total=Object.values(bfCounts).reduce((a,b)=>a+(+b||0),0);
  document.getElementById('bf-total').textContent=total+' requested';
  document.getElementById('bf-go').disabled = total<1;
}
async function submitBackfill(){
  // Build requests[] using the FULL canonical category the backend expects.
  const requests=[];
  BF_CHANNELS.forEach(c=>{
    const n=+bfCounts[c]||0;
    if(n>0) requests.push({ category: CAT_MATCH[c]||c, count:n });
  });
  if(!requests.length){ return; }
  const go=document.getElementById('bf-go');
  const bfBtn=document.getElementById('backfill-btn');   // the appbar button that will spin
  go.disabled=true; go.classList.add('working'); go.textContent='Working…';
  // Start the spin IMMEDIATELY (before the network round-trip) so there's instant,
  // unmistakable feedback the moment you tap Request — and scroll it into view since
  // the appbar scrolls horizontally and the button may be off-screen on Discovery.
  if(bfBtn){
    bfBtn.classList.add('spinning'); bfBtn.disabled=true;
    try{ bfBtn.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'}); }catch(_){}
  }
  const summary=requests.map(r=>`${r.count} ${shortCat(r.category)}`).join(', ');
  toast('Backfilling — '+summary+'…');
  // Snapshot how many Discovery cards exist NOW so we can detect new arrivals.
  const beforeCount = allStories.filter(s=>(s.thumbnail_url||'').trim()).length;
  try{
    // The v2 backend responds IMMEDIATELY (after Pull+Plan) with the plan counts;
    // generation continues in the background. So this fetch returns in ~2s, NOT after
    // the slow thumbnail render — no more false "failed".
    const res=await fetch(BACKFILL_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({requests})});
    const data=await res.json().catch(()=>({}));
    const pulled=(data&&data.pulled)||0;
    const generating=(data&&data.generating)||0;   // v2 field name
    const expectedNew = pulled + generating;        // total cards that should appear
    closeBackfill();
    activeView='discovery';                          // look at where cards will land
    toast(`Backfill accepted — ${pulled} pulled, ${generating} generating…`);

    // Spinner already started on submit; poll Discovery until the expected number of
    // NEW cards have landed, or a hard timeout. Pulls appear on the next load; generated
    // cards appear as their Kie thumbnails arrive over the following minutes.
    if(bfBtn){ try{ bfBtn.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'}); }catch(_){} }
    const startedAt=Date.now();
    const MAX_MS=8*60*1000;                          // generation can take a few minutes
    if(window._bfPoller) clearInterval(window._bfPoller);
    await load();                                    // immediate refresh (surfaces pulls)
    window._bfPoller=setInterval(async ()=>{
      await load();
      const nowCount=allStories.filter(s=>(s.thumbnail_url||'').trim()).length;
      const arrived=Math.max(0, nowCount - beforeCount);
      const done = expectedNew>0 ? (arrived>=expectedNew) : true;
      const timedOut = Date.now()-startedAt>MAX_MS;
      if(done || timedOut){
        clearInterval(window._bfPoller); window._bfPoller=null;
        if(bfBtn){ bfBtn.classList.remove('spinning'); bfBtn.disabled=false; }
        if(done){ toast(`Backfill ready ✓ — ${arrived} new at top of Discovery`); }
        else    { toast('Backfill still rendering — tap ↻ to check'); }
      }
    }, 15000);
  }catch(err){
    console.error('backfill failed:',err);
    toast('Backfill request failed — retry');
    if(bfBtn){ bfBtn.classList.remove('spinning'); bfBtn.disabled=false; }
  }finally{
    go.disabled=false; go.classList.remove('working'); go.textContent='Request';
    bfUpdateTotal();
  }
}

function shortCat(c){
  if(!c) return '';
  if(c.includes('Mystery'))return'Night Feed';
  if(c.includes('Horror'))return'Horror';
  if(c.includes('True Crime'))return'True Crime';
  if(c.includes('Psychology'))return'Psychology';
  if(c.includes('Science'))return'Science';
  if(c.includes('Technology'))return'Technology';
  if(c.includes('Survival'))return'Survival';
  if(c.includes('Philosophy'))return'Philosophy';
  if(c.includes('Travel'))return'Travel';
  if(c.includes('History'))return'History';
  if(c.includes('Mystery'))return'Mystery';
  return c;
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

// Fire the regen webhook: processes every Discovery row with Thumbnail Request = ADD.
// n8n submits each row to Kie (renders take ~30-90s each), stamps the Task ID, flips
// the cell to COMPLETE; the resolve/callback pass fills Thumbnail URL when each lands.
// Because rendering is async, we poll the feed until the new thumbnails arrive and
// keep the button visibly "rendering" so you know more are still coming.
let genPollTimer=null;
function readyThumbCount(){
  return allStories.filter(s=>(s.thumbnail_url||'').trim()).length;
}
async function generateThumbnails(){
  const btn=document.getElementById('genthumb-btn');
  if(btn.classList.contains('rendering')) return; // already running
  const original='Gen Thumbs';
  btn.disabled=true; btn.textContent='Submitting…';
  try{
    const res=await fetch(GEN_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'gen_thumbs'})});
    const data=await res.json().catch(()=>({}));
    const n=(data&&typeof data.submitted==='number')?data.submitted:null;

    if(n===0){ toast('No ADD rows found'); btn.disabled=false; btn.textContent=original; return; }

    const expected = n || 1;                 // how many we're waiting on
    toast(n ? `Submitting ${n} for render…` : 'Submitting…');

    // capture how many thumbnails exist right now, so we can detect new arrivals
    await load();                            // refresh once to sync baseline
    const baseline = readyThumbCount();
    let arrived = 0;

    // enter "rendering" state: button pulses until all expected land (or timeout)
    btn.disabled=false;                      // tappable again, but guarded above
    btn.classList.add('rendering');
    btn.textContent=`Rendering ${expected}…`;

    const startedAt=Date.now();
    const MAX_MS=4*60*1000;                   // give Kie up to 4 min for the batch
    clearInterval(genPollTimer);
    genPollTimer=setInterval(async ()=>{
      await load();                           // repaints feed; new thumbs appear here
      const nowReady=readyThumbCount();
      const gained=nowReady-baseline;
      if(gained>arrived){
        const justLanded=gained-arrived;
        arrived=gained;
        toast(`${arrived} of ${expected} ready`);
        btn.textContent = arrived>=expected ? 'Done ✓' : `Rendering ${expected-arrived}…`;
      }
      const timedOut=Date.now()-startedAt>MAX_MS;
      if(arrived>=expected || timedOut){
        clearInterval(genPollTimer); genPollTimer=null;
        btn.classList.remove('rendering');
        if(timedOut && arrived<expected){
          toast(`${arrived} of ${expected} ready — tap ↻ to check the rest`);
        }
        setTimeout(()=>{ btn.textContent=original; }, 2500);
      }
    }, 15000);                                // check every 15s

  }catch(err){
    console.error('gen-thumb failed:',err);
    toast('Gen Thumbs failed — retry');
    btn.classList.remove('rendering'); btn.disabled=false; btn.textContent=original;
  }
}

// bottom nav + source toggles
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{activeView=t.dataset.view;render();});
document.querySelectorAll('.src').forEach(c=>c.onchange=render);

load();
</script>
