<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NanoRunway · Discovery</title>
<style>
/* ---------- YouTube-mobile faithful reproduction ----------
   Goal: judge stories in the exact visual context they'll compete in.
   Layout, type scale, and spacing mirror the YouTube Android feed. */
:root{
  --bg:#0f0f0f;            /* YT dark bg */
  --surface:#0f0f0f;
  --chip:#272727;
  --chip-active:#f1f1f1;
  --chip-active-text:#0f0f0f;
  --text:#f1f1f1;
  --text-dim:#aaaaaa;
  --line:#272727;
  --red:#ff0000;
  --green:#7EE8A2;
  --amber:#FFD166;
  --skip:#888;
  --pill:#000c;
  --yt-sans:'Roboto','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:var(--yt-sans);}
body{max-width:480px;margin:0 auto;padding-bottom:64px;overflow-x:hidden;}

/* ---- Top app bar ---- */
.appbar{position:sticky;top:0;z-index:30;background:var(--bg);
  display:flex;align-items:center;gap:10px;padding:12px 14px 8px;}
.yt-logo{display:flex;align-items:center;gap:6px;font-weight:700;font-size:20px;letter-spacing:-.5px;}
.yt-mark{width:30px;height:21px;background:var(--red);border-radius:5px;position:relative;flex:none;}
.yt-mark::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-45%,-50%);
  border-left:9px solid #fff;border-top:6px solid transparent;border-bottom:6px solid transparent;}
.src-toggles{display:flex;gap:12px;font-size:13px;color:var(--text-dim);margin-left:10px;}
.refresh-btn{margin-left:auto;background:var(--chip);border:none;color:var(--text);
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex:none;}
.refresh-btn:active{background:#3a3a3a;}
.refresh-btn svg{width:18px;height:18px;}
.refresh-btn.spinning svg{animation:spin .8s linear infinite;}
.src-toggles label{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;}
.src-toggles input{accent-color:var(--red);width:14px;height:14px;}

/* ---- Category chips ---- */
.chips{display:flex;gap:8px;overflow-x:auto;padding:6px 14px 12px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:none;background:var(--chip);color:var(--text);border:none;
  padding:8px 14px;border-radius:9px;font-size:14px;font-weight:500;white-space:nowrap;cursor:pointer;}
.chip.active{background:var(--chip-active);color:var(--chip-active-text);font-weight:600;}

/* ---- Feed ---- */
.feed{display:flex;flex-direction:column;}
.card{cursor:pointer;}
.thumb-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#1c1c1c;overflow:hidden;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  color:#555;font-size:13px;text-align:center;padding:0 20px;line-height:1.4;}
.dur{position:absolute;right:8px;bottom:8px;background:var(--pill);color:#fff;
  font-size:12px;font-weight:600;padding:2px 5px;border-radius:5px;}
.meta{display:flex;gap:12px;padding:12px 12px 18px;}
.avatar{width:36px;height:36px;border-radius:50%;flex:none;background:#333;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.meta-text{flex:1;min-width:0;}
.vid-title{font-size:15px;font-weight:600;line-height:1.3;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
/* When the card is expanded, reveal the FULL title (no clamp) so a cut-off
   headline/title never ends abruptly — tapping the card shows the rest. */
.card.open .vid-title{-webkit-line-clamp:unset;display:block;overflow:visible;}
.vid-sub{font-size:13px;color:var(--text-dim);margin-top:4px;line-height:1.35;}
.kebab{flex:none;color:var(--text-dim);font-size:20px;line-height:1;padding:2px 2px 0;}

/* status accent dot on card */
.statusline{height:2px;width:0;background:var(--green);transition:width .3s;}
.card[data-eff="selected"] .statusline{width:100%;background:var(--green);}
.card[data-eff="hold"]     .statusline{width:100%;background:var(--amber);}
.card[data-eff="skip"]     .statusline{width:100%;background:#444;}

/* ---- Expanded detail (tap to open) ---- */
.detail{display:none;background:#1a1a1a;border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);padding:16px 14px 20px;}
.card.open .detail{display:block;animation:slide .22s ease;}
@keyframes slide{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
.d-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.badge{font-size:12px;font-weight:600;padding:4px 9px;border-radius:7px;background:#272727;color:var(--text-dim);}
.badge.score{color:var(--green);background:rgba(126,232,162,.12);}
.badge.gate-pass{color:var(--green);background:rgba(126,232,162,.12);}
.badge.gate-fail{color:#E57373;background:rgba(229,115,115,.12);}
.d-block{margin-bottom:13px;}
.d-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;}
.d-val{font-size:14px;line-height:1.5;color:var(--text);}
.d-val.pitch{font-style:italic;color:#ddd;}
.actions{display:flex;gap:8px;margin-top:18px;}
.abtn{flex:1;padding:12px;border-radius:10px;border:1px solid;font-size:14px;font-weight:700;
  cursor:pointer;background:transparent;transition:transform .1s;}
.abtn:active{transform:scale(.97);}
.abtn-deploy{color:var(--green);border-color:rgba(126,232,162,.4);background:rgba(126,232,162,.10);}
.abtn-hold{color:var(--amber);border-color:rgba(255,209,102,.4);background:rgba(255,209,102,.10);}
.abtn-skip{color:#bbb;border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.04);}

/* ---- Bottom nav ---- */
.botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:#0f0f0f;border-top:1px solid var(--line);display:flex;z-index:40;}
.tab{flex:1;padding:9px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--text-dim);font-size:11px;font-weight:500;cursor:pointer;background:none;border:none;}
.tab.active{color:var(--text);}
.tab svg{width:22px;height:22px;}
.tab .count{position:absolute;}

/* ---- misc ---- */
.empty{padding:60px 30px;text-align:center;color:var(--text-dim);font-size:14px;line-height:1.6;}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:#fff;color:#0f0f0f;
  padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:60;opacity:0;
  transition:opacity .2s;pointer-events:none;}
.toast.show{opacity:1;}
.loading{padding:50px;text-align:center;color:var(--text-dim);}
.spinner{width:28px;height:28px;border:3px solid #333;border-top-color:var(--red);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="appbar">
  <div class="yt-logo"><span class="yt-mark"></span>Discovery</div>
  <button class="refresh-btn" id="refresh-btn" title="Refresh feed" onclick="load()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
  </button>
  <div class="src-toggles">
    <label><input type="checkbox" class="src" value="reddit" checked>Reddit</label>
    <label><input type="checkbox" class="src" value="youtube" checked>YouTube</label>
    <label><input type="checkbox" class="src" value="news" checked>News</label>
  </div>
</div>

<div class="chips" id="chips"></div>

<div class="feed" id="feed">
  <div class="loading"><div class="spinner"></div>Loading stories…</div>
</div>

<nav class="botnav" id="botnav">
  <button class="tab active" data-view="discovery">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    Discovery</button>
  <button class="tab" data-view="deployed">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3 22 20H2z"/></svg>
    Deployed</button>
  <button class="tab" data-view="hold">
    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
    On Hold</button>
  <button class="tab" data-view="skip">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 6 18 18M18 6 6 18"/></svg>
    Skipped</button>
</nav>

<div class="toast" id="toast"></div>

<script>
const READ_URL = 'https://askai.app.n8n.cloud/webhook/nano-dashboard-read';
const ACT_URL  = 'https://askai.app.n8n.cloud/webhook/nano-dashboard-action';

// 10 canonical categories (chip labels are short; match against full Channel Category)
const CATS = ['All','Night Feed','True Crime','History','Science','Psychology','Horror','Survival','Technology','Philosophy','Travel'];
// map short chip -> substring to match the full canonical category coming from the sheet
const CAT_MATCH = {
  'Night Feed':'Mystery & The Unknown', 'True Crime':'True Crime', 'History':'History',
  'Science':'Science', 'Psychology':'Psychology', 'Horror':'Horror & Dark',
  'Survival':'Survival', 'Technology':'Technology', 'Philosophy':'Philosophy', 'Travel':'Travel'
};

let allStories=[];
let activeCat='All';
let activeView='discovery';
const localActs = JSON.parse(localStorage.getItem('nano_acts')||'{}'); // survives refresh
function saveActs(){ try{localStorage.setItem('nano_acts',JSON.stringify(localActs));}catch(_){} }

const SHEET_ACTIONS = new Set(['selected','hold','skip']);
const effStatus = s => {
  if(SHEET_ACTIONS.has(s.status)) return s.status;
  const a = localActs[s.source_url];
  return a ? (a==='select'?'selected':a) : (s.status||'scored');
};

// ---- data fetch (unchanged contract) ----
async function load(){
  const rb=document.getElementById('refresh-btn');
  if(rb) rb.classList.add('spinning');
  try{
    const res = await fetch(READ_URL);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    allStories = data.stories || [];
  }catch(e){
    document.getElementById('feed').innerHTML =
      '<div class="empty">Couldn\'t reach the pipeline.<br>'+e.message+'</div>';
    if(rb) rb.classList.remove('spinning');
    return;
  }
  if(rb) rb.classList.remove('spinning');
  renderChips();
  render();
}

function renderChips(){
  const c=document.getElementById('chips');
  c.innerHTML='';
  CATS.forEach(cat=>{
    const b=document.createElement('button');
    b.className='chip'+(cat===activeCat?' active':'');
    b.textContent=cat;
    b.onclick=()=>{activeCat=cat;renderChips();render();};
    c.appendChild(b);
  });
}

function viewMatch(s){
  const eff=effStatus(s);
  if(activeView==='discovery') return !SHEET_ACTIONS.has(eff) || eff==='scored';
  if(activeView==='deployed')  return eff==='selected';
  if(activeView==='hold')      return eff==='hold';
  if(activeView==='skip')      return eff==='skip';
  return true;
}
function catMatch(s){
  if(activeCat==='All') return true;
  const want=CAT_MATCH[activeCat]||activeCat;
  return (s.channel_category||'').includes(want);
}
function srcMatch(s){
  const on=[...document.querySelectorAll('.src:checked')].map(x=>x.value);
  return on.includes((s.source||'').toLowerCase()) || on.length===3;
}

function fmtViews(n){
  n=+n||0;
  if(n>=1e6) return (n/1e6).toFixed(1).replace('.0','')+'M';
  if(n>=1e3) return (n/1e3).toFixed(0)+'K';
  return n;
}
function relDate(d){
  if(!d) return '';
  const t=new Date(d).getTime(); if(isNaN(t)) return '';
  const days=Math.floor((Date.now()-t)/864e5);
  if(days<=0) return 'today';
  if(days===1) return '1 day ago';
  if(days<30) return days+' days ago';
  const mo=Math.floor(days/30); if(mo<12) return mo+(mo===1?' month ago':' months ago');
  const yr=Math.floor(days/365); return yr+(yr===1?' year ago':' years ago');
}
const initials = name => (name||'?').replace(/[^A-Za-z ]/g,'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()||'?';

function render(){
  const feed=document.getElementById('feed');
  let list=allStories.filter(s=>catMatch(s)&&viewMatch(s)&&srcMatch(s));
  // Discovery: only show cards that already carry a real baked thumbnail.
  // (Blank rows stay in the sheet — they're just hidden here until rendered.)
  if(activeView==='discovery') list=list.filter(s=>(s.thumbnail_url||'').trim());
  // Newest first. Prefer Date Added; fall back to sheet row order (later row = newer).
  const ts=s=>{const t=new Date(s.date_added||0).getTime();return isNaN(t)?0:t;};
  list.sort((a,b)=> (ts(b)-ts(a)) || ((+b.row_number||0)-(+a.row_number||0)) );
  // bottom-nav active state
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===activeView));
  if(!list.length){
    feed.innerHTML='<div class="empty">No stories here yet.<br>'+
      (activeView==='discovery'?'Run the collector to populate Discovery.':'Nothing in this bucket.')+'</div>';
    return;
  }
  feed.innerHTML='';
  list.forEach(s=>feed.appendChild(card(s)));
}

function card(s){
  const eff=effStatus(s);
  const el=document.createElement('div');
  el.className='card'; el.dataset.eff=eff;

  const headline=(s.thumbnail_headline||s.thumbnail_text||'').trim();
  const thumbUrl=(s.thumbnail_url||'').trim();
  const dur = s.source==='youtube' && s.duration ? s.duration : '';

  // ---- thumbnail (the baked-in image is the art; headline shown only as fallback text) ----
  const thumbInner = thumbUrl
    ? `<img src="${thumbUrl}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=&quot;thumb-fallback&quot;>${(headline||'No thumbnail yet').replace(/"/g,'')}</div>'">`
    : `<div class="thumb-fallback">${headline||'Thumbnail pending'}</div>`;

  // YouTube-style metadata: channel name = the channel this story is FOR; views/age from the source signal
  const chName = s.channel_category ? shortCat(s.channel_category) : (s.source_name||'NanoRunway');
  const viewBits=[];
  if(s.source==='youtube' && s.viral_count) viewBits.push(fmtViews(s.viral_count)+' views');
  if(s.source_name && s.source==='youtube') viewBits.unshift(s.source_name);
  const ageStr=relDate(s.date_added);
  const subline=[chName, viewBits.join(' · '), ageStr].filter(Boolean).join(' · ');

  el.innerHTML=`
    <div class="thumb-wrap">${thumbInner}${dur?`<span class="dur">${dur}</span>`:''}</div>
    <div class="statusline"></div>
    <div class="meta">
      <div class="avatar">${initials(chName)}</div>
      <div class="meta-text">
        <div class="vid-title">${esc(s.title||'Untitled')}</div>
        <div class="vid-sub">${esc(subline)}</div>
      </div>
      <div class="kebab">⋮</div>
    </div>
    ${detailHTML(s)}`;

  // tap card toggles detail (ignore taps on action buttons)
  el.querySelector('.meta').onclick=()=>el.classList.toggle('open');
  el.querySelector('.thumb-wrap').onclick=()=>el.classList.toggle('open');
  el.querySelectorAll('.abtn').forEach(b=>{
    b.onclick=(ev)=>{ev.stopPropagation();sendAction(b.dataset.act,s,el);};
  });
  return el;
}

function detailHTML(s){
  const score=parseFloat(s.score)||parseFloat(s.viral_score)||0;
  const gate=(s.gate_pass||'').toString().toUpperCase()==='TRUE'||s.gate_pass===true;
  const job=s.thumbnail_job?`<span class="badge">${esc(s.thumbnail_job)}</span>`:'';
  return `<div class="detail">
    <div class="d-row">
      ${score?`<span class="badge score">★ ${score.toFixed(1)}</span>`:''}
      <span class="badge ${gate?'gate-pass':'gate-fail'}">${gate?'GATE PASS':'GATE FAIL'}</span>
      <span class="badge">${esc(s.source||'')}</span>
      ${job}
    </div>
    ${block('Headline',(s.thumbnail_headline||s.thumbnail_text))}
    ${block('Elevator Pitch',s.elevator_pitch,'pitch')}
    ${block('Caption',s.caption)}
    ${block('Thumbnail Concept',s.thumbnail_concept)}
    ${block('What Really Happened',trimText((s.story_summary&&s.story_summary.trim())?s.story_summary:s.story_text))}
    ${block('Audience Hook',s.audience_hook)}
    <div class="actions">
      <button class="abtn abtn-deploy" data-act="select">Deploy</button>
      <button class="abtn abtn-hold"   data-act="hold">Hold</button>
      <button class="abtn abtn-skip"   data-act="skip">Skip</button>
    </div>
  </div>`;
}
function block(label,val,cls=''){
  if(!val||!String(val).trim()) return '';
  return `<div class="d-block"><div class="d-label">${label}</div><div class="d-val ${cls}">${esc(val)}</div></div>`;
}
// Fallback for "What Really Happened" when the scorer left Story Summary blank.
// Goal: a quick 3-4 sentence scan, not a wall of text. Takes the first few complete
// sentences of the raw Story Text, with a hard char backstop so a run-on can't sprawl.
function trimText(t){
  t=String(t||'').replace(/\s+/g,' ').trim(); if(!t) return '';
  const MAX_SENTENCES=4, HARD_CAP=360;
  // split into sentences, keeping their end punctuation
  const sentences=t.match(/[^.!?]+[.!?]+/g) || [t];
  let out='';
  for(let i=0;i<sentences.length && i<MAX_SENTENCES;i++){
    const next=(out+sentences[i]).trim();
    if(next.length>HARD_CAP){ if(!out) out=sentences[i].slice(0,HARD_CAP).trim()+'…'; break; }
    out=next;
  }
  return out.trim();
}

// ---- action POST (unchanged contract: action, source_url, story) ----
async function sendAction(action,story,el){
  const url=story.source_url;
  localActs[url]=action; saveActs();
  el.dataset.eff = action==='select'?'selected':action;
  toast(action==='select'?'Deployed →':action==='hold'?'On hold':'Skipped');
  el.classList.remove('open');
  try{
    await fetch(ACT_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action,source_url:url,story})});
  }catch(_){}
  // if we're in a filtered view, re-render so the card moves to its bucket
  setTimeout(render,260);
}

function shortCat(c){
  if(!c) return '';
  if(c.includes('Mystery'))return'Night Feed';
  if(c.includes('Horror'))return'Horror';
  if(c.includes('True Crime'))return'True Crime';
  if(c.includes('Psychology'))return'Psychology';
  if(c.includes('Science'))return'Science';
  if(c.includes('Technology'))return'Technology';
  if(c.includes('Survival'))return'Survival';
  if(c.includes('Philosophy'))return'Philosophy';
  if(c.includes('Travel'))return'Travel';
  if(c.includes('History'))return'History';
  if(c.includes('Mystery'))return'Mystery';
  return c;
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1600);}

// bottom nav + source toggles
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{activeView=t.dataset.view;render();});
document.querySelectorAll('.src').forEach(c=>c.onchange=render);

load();
</script>
</body>
</html>
